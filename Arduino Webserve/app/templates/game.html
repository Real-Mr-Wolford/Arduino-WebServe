<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arduino Catch!</title>
    <style> 
        canvas { border: 2px solid #333; background: #f0f0f0; display: block; margin: 20px auto; cursor: crosshair; }
        body { text-align: center; font-family: Arial, sans-serif; background-color: #fafafa; }
        .score-board { font-size: 24px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>Arduino Catch!</h1>
    <p>Click the ball to catch it before it hits the bottom!</p>
    <p class="score-board">Score: <span id="score">0</span></p>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let ball = { x: 200, y: 0, radius: 20, speed: 3 };

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'red';
            ctx.fill();
            ctx.closePath();

            ball.y += ball.speed;

            if (ball.y > canvas.height) { 
                ball.y = 0; 
                ball.x = Math.random() * (canvas.width - 40) + 20; 
                score = 0; 
                ball.speed = 3;
                document.getElementById("score").innerHTML = score;
            }

            requestAnimationFrame(update);
        }

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            
            let dist = Math.sqrt((mouseX - ball.x)**2 + (mouseY - ball.y)**2);
            
            if (dist < ball.radius) {
                score++;
                document.getElementById("score").innerHTML = score;
                ball.y = 0;
                ball.x = Math.random() * (canvas.width - 40) + 20;
                ball.speed += 0.3; 
            }
        });

       
        update();
    </script>

    <br>
    <a href="/"><button style="padding: 10px 20px;">Back to Home</button></a>
</body>
</html>
